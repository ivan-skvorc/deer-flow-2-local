# SearXNG metasearch engine for DeerFlow's web_search tool.
# Bound to 127.0.0.1 only — never exposed beyond loopback.
# Image is pinned for reproducibility; bump when you actively want updates.
services:
  searxng:
    image: searxng/searxng:2026.4.24-a7ac696b4
    container_name: deerflow-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
